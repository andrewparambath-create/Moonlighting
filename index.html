<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlighting — Drew</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f8f8f5;--border:#eceae4;
  --text:#1a1a18;--text2:#777;--text3:#bbb;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-border:#a5d6a7;
  --blue:#1565c0;--blue-bg:#e3f2fd;--blue-border:#90caf9;
  --purple:#6a1b9a;--purple-bg:#f3e5f5;--purple-border:#ce93d8;
  --red:#c62828;--red-bg:#ffebee;--amber:#f57f17;
  --radius:14px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 6rem}
.wrap{max-width:700px;margin:0 auto}
.header{margin-bottom:1.25rem}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.header p{font-size:13px;color:var(--text2)}

/* Year tabs */
.year-tabs{display:flex;gap:6px;margin-bottom:10px}
.year-tab{flex:1;font-size:13px;font-weight:600;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;color:var(--text2);transition:all .15s}
.year-tab.active{background:var(--text);color:#fff;border-color:var(--text)}

/* Month nav */
.month-nav{display:flex;gap:4px;margin-bottom:1.25rem;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:5px;flex-wrap:wrap}
.month-btn{flex:1;min-width:44px;font-size:11px;font-weight:500;padding:7px 2px;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s;text-align:center;line-height:1.3}
.month-btn:hover{background:var(--surface2);color:var(--text)}
.month-btn.active{background:var(--text);color:#fff}
.month-btn.empty{color:var(--text3);cursor:default}
.month-btn.empty:hover{background:none}
.month-btn.blocked{color:var(--red);opacity:.6}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:.875rem}
.card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.card-sub{font-size:12px;color:var(--text2)}
.card-sub.sel{color:var(--green);font-weight:600}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-n.g{color:var(--green)}.stat-n.b{color:var(--text3)}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}

/* Banners */
.banner{border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:.75rem;font-size:12px;display:flex;align-items:center;gap:8px;line-height:1.4}
.banner strong{font-size:13px;display:block}
.b-vacation{background:#fff8e1;border:1px solid #ffe082;color:#5d4037}
.b-jeopardy{background:#ffebee;border:1px solid #ef9a9a;color:var(--red)}
.b-icu{background:#fce4ec;border:1px solid #f48fb1;color:#880e4f}
.b-normal{background:var(--green-bg);border:1px solid var(--green-border);color:var(--green)}
.b-elect{background:var(--purple-bg);border:1px solid var(--purple-border);color:var(--purple)}
.b-kaiser{background:#e8eaf6;border:1px solid #9fa8da;color:#283593}
.b-night{background:#ede7f6;border:1px solid #b39ddb;color:#4527a0}

/* Two col */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.875rem}
@media(max-width:540px){.two-col{grid-template-columns:1fr}}
.col-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1rem}
.col-title{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center}

.sched-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);gap:8px}
.sched-row:last-child{border-bottom:none}
.sched-date{font-size:13px;font-weight:600;min-width:50px}
.sched-dow{font-size:10px;color:var(--text3);margin-top:1px}
.sched-right{text-align:right}
.sched-name{font-size:11px;color:var(--text2)}
.sched-time{font-size:10px;color:var(--text3)}

.moon-row{padding:8px 0;border-bottom:1px solid var(--border)}
.moon-row:last-child{border-bottom:none}
.moon-row.dim{opacity:.4}
.moon-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.moon-date{font-size:13px;font-weight:600}
.moon-dow{font-size:10px;color:var(--text3);margin-top:1px}
.moon-pay{font-size:11px;color:var(--text3)}
.moon-pay.sel{color:var(--green);font-weight:600}
.pills-row{display:flex;gap:5px;flex-wrap:wrap}
.block-reason{font-size:10px;color:var(--text3);font-style:italic;margin-top:3px}

.shift-pill{font-size:11px;font-weight:500;padding:5px 10px;border-radius:20px;cursor:pointer;transition:all .15s;border:2px solid transparent;user-select:none;white-space:nowrap}
.shift-pill:hover:not(.disabled){transform:scale(1.05)}
.shift-pill.disabled{cursor:not-allowed;opacity:.35}
.sp-s1{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.sp-s2{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.sp-on{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-border)}
.sp-s1.sel{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 2px 8px rgba(46,125,50,.3)}
.sp-s2.sel{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 2px 8px rgba(21,101,192,.3)}
.sp-on.sel{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 2px 8px rgba(106,27,154,.3)}

.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.earn-card{background:var(--surface2);border-radius:var(--radius-sm);padding:14px}
.earn-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.earn-amount{font-size:22px;font-weight:700;color:var(--green);margin-bottom:2px}
.earn-desc{font-size:11px;color:var(--text2);line-height:1.5}
.earn-divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.earn-note{font-size:12px;color:var(--text2);line-height:1.9}

.rule{display:flex;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);color:var(--text2);line-height:1.5;align-items:flex-start}
.rule:last-child{border-bottom:none}

.bottom-bar{position:fixed;bottom:-80px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 1.25rem;z-index:100;transition:bottom .2s ease;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bottom-bar.visible{bottom:0}
.bottom-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bar-count{font-size:12px;color:var(--text2);margin-bottom:2px}
.bar-earn{font-size:20px;font-weight:700;color:var(--green)}
.bar-actions{display:flex;gap:8px}
.btn{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:#1b5e20}

.cal-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.cal-item:last-child{border-bottom:none}
.cal-date{font-size:14px;font-weight:600}
.cal-shift{font-size:12px;color:var(--text2);margin-top:2px}
.cal-right{display:flex;align-items:center;gap:10px}
.cal-pay{font-size:14px;font-weight:600;color:var(--green)}
.add-btn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:6px;background:var(--green);color:#fff;text-decoration:none;white-space:nowrap}
.cal-total{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;margin-top:.5rem;border-top:1px solid var(--border)}

.empty-state{text-align:center;padding:1.5rem 0;color:var(--text3);font-size:13px}
.loader{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text2);font-size:14px;padding:3rem}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.err{font-size:13px;color:var(--red);line-height:1.7;padding:.5rem 0}
.footer{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;padding:0 2px}
.footer-time{font-size:11px;color:var(--text3)}
.refresh{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Moonlighting</h1>
    <p>Stanford EM · Drew Parambath · Tap a shift pill to select · Submit to add to calendar</p>

    <span class="footer-time" id="updated"></span>
    <button class="refresh" onclick="init()">↺ refresh</button>

</div>

<div class="bottom-bar" id="bottom-bar">

<script>

// ── PGY-4 rotation schedule (2026-2027) ──────────────────────────────────────
const ROTATIONS_2026 = [

// Rotation metadata
const ROT_META = {
  'Vacation':  {icon:'🏖',label:'Vacation',        cls:'b-vacation',noMoon:true, note:'No internal moonlighting on vacation weeks'},
  'MICU':      {icon:'🫁',label:'MICU',            cls:'b-icu',     noMoon:true, note:'ICU rotation — no moonlighting'},
  'PICU':      {icon:'👶',label:'PICU',            cls:'b-icu',     noMoon:true, note:'ICU rotation — no moonlighting'},
  'SICU':      {icon:'🔬',label:'SICU',            cls:'b-icu',     noMoon:true, note:'SICU rotation — no moonlighting (4-day rule)'},
  'CVICU':     {icon:'🫀',label:'CVICU',           cls:'b-icu',     noMoon:true, note:'ICU rotation — no moonlighting'},

// ── State ─────────────────────────────────────────────────────────────────────
let allShifts=[], viewYear=new Date().getFullYear(), viewMonth=new Date().getMonth();
let selected={};
let activeYear = new Date().getFullYear() < 2026 ? '2025-2026' : '2026-2027';

function getRotationSchedule(){ return activeYear==='2025-2026'?ROTATIONS_2025:ROTATIONS_2026; }
function getJeopardy(){ return JEOPARDY[activeYear]||[]; }

function getDateObj(iso){const[y,m,d]=iso.split('-').map(Number);return new Date(y,m-1,d);}

function getRotation(yr,mo,dy){
  const d=new Date(yr,mo,dy);
  for(const[s,e,r] of getRotationSchedule()){
    if(d>=getDateObj(s)&&d<=getDateObj(e))return r;
  }
  return null;
}

function isJeopardy(yr,mo,dy){
  const d=new Date(yr,mo,dy);
  return getJeopardy().some(([s,e])=>d>=getDateObj(s)&&d<=getDateObj(e));
}
function isVacation(yr,mo,dy){return getRotation(yr,mo,dy)==='Vacation';}
function isICU(yr,mo,dy){const r=getRotation(yr,mo,dy);return r&&['MICU','PICU','SICU','CVICU'].includes(r);}

function dn(yr,mo,dy){return Math.floor(new Date(yr,mo,dy)/86400000);}
function dayPrefix(yr,mo,dy){return `${yr}-${String(mo+1).padStart(2,'0')}-${String(dy).padStart(2,'0')}:`;}

function parseIcal(text){
  const shifts=[];
  const unfolded=text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  unfolded.split('BEGIN:VEVENT').slice(1).forEach(b=>{
    const get=k=>{const m=b.match(new RegExp(k+'[^:;]*(?:;[^:]*)?:([^\\r\\n]+)'));return m?m[1].trim():'';};
    const dtstart=get('DTSTART'),dtend=get('DTEND');
    const name=(get('SUMMARY')||'').replace(/\\,/g,',').replace(/\\n/g,' ').trim();
    if(!dtstart||!name)return;
    const parseDT=s=>{
      const c=s.replace(/[-:]/g,'');
      const yr=+c.slice(0,4),mo=+c.slice(4,6)-1,dy=+c.slice(6,8);
      let hr=0;const tIdx=c.indexOf('T');if(tIdx>=0)hr=+c.slice(tIdx+1,tIdx+3)||0;
      return{yr,mo,dy,hr};
    };
    const s=parseDT(dtstart),e=dtend?parseDT(dtend):null;
    let endH=e?(e.dy>s.dy?e.hr+24:(e.hr===0&&e.dy===s.dy?24:e.hr)):s.hr+9;
    if(endH===0)endH=24;
    shifts.push({name,yr:s.yr,mo:s.mo,dy:s.dy,startH:s.hr,endH,night:s.hr>=22||(e&&e.dy>s.dy),dn:dn(s.yr,s.mo,s.dy)});
  });
  return shifts;
}

function shiftTime(s){
  const fmt=n=>{const h=n%24;return h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';};
  if(!s.startH&&!s.endH)return '';
  return `${fmt(s.startH)}–${fmt(s.endH>24?s.endH-24:s.endH)}${s.endH>24?' +1':''}`;
}

function getWorkedDays(){
  const days=new Set();
  allShifts.forEach(s=>days.add(s.dn));
  Object.values(selected).forEach(v=>days.add(dn(v.yr,v.mo,v.dy)));
  return days;
}

function wouldCreate7(dayN){
  const w=getWorkedDays();w.add(dayN);
  for(let s=dayN-6;s<=dayN;s++){let c=0;for(let i=0;i<7;i++){if(w.has(s+i))c++;else break;}if(c>=7)return true;}
  return false;
}

function computeMonth(shifts,yr,mo){
  const dim=new Date(yr,mo+1,0).getDate(),out=[];
  for(let d=1;d<=dim;d++){
    const dow=new Date(yr,mo,d).getDay(),dayN=dn(yr,mo,d);
    const hasEM=shifts.some(s=>s.dn===dayN);
    const isTue=dow===2;
    const rot=getRotation(yr,mo,d);
    const rotMeta=rot?ROT_META[rot]:null;
    const rotBlocked=rotMeta&&rotMeta.noMoon;
    const onJeopardy=isJeopardy(yr,mo,d);
    const onVacation=isVacation(yr,mo,d);
    // SICU: also block surrounding 4 days
    const nearSICU=[0,1,2,3].some(b=>shifts.some(s=>s.dn===dayN-b&&/sicu|icu/i.test(s.name)));

    if(hasEM||isTue||rotBlocked||onJeopardy||onVacation||nearSICU){
      let br=onVacation?'vacation':onJeopardy?'jeopardy':rotBlocked?rot:nearSICU?'sicu':isTue?'tuesday':'shift';
      out.push({d,dow,avail:[],blockReason:br,hasEM,rot});
      continue;
    }
    const avail=[];
    for(const ms of MOON){
      const mS=dayN*24+ms.startH,mE=dayN*24+ms.endH;
      let ok=true;
      for(const em of shifts){
        const eS=em.dn*24+em.startH,eE=em.dn*24+em.endH;
        if(mS<eE+GAP&&mS>=eS){ok=false;break;}
        if(mE>eS-GAP&&mE<=eS+ms.hrs+1){ok=false;break;}
      }
      if(ok)avail.push(ms);
    }
    out.push({d,dow,avail,blockReason:null,hasEM:false,rot});
  }
  return out;
}

function toggleShift(yr,mo,dy,msId){
  const pfx=dayPrefix(yr,mo,dy),k=pfx+msId;
  const already=Object.keys(selected).find(x=>x.startsWith(pfx));
  if(already===k){delete selected[k];updateBar();renderContent();return;}
  if(already)delete selected[already];
  if(wouldCreate7(dn(yr,mo,dy))){alert('This would create 7 consecutive working days (ACGME violation). Please leave a day free.');return;}
  selected[k]={yr,mo,dy,ms:MOON.find(m=>m.id===msId)};
  updateBar();renderContent();
}

function clearAll(){selected={};updateBar();renderContent();}

function updateBar(){
  const vals=Object.values(selected);
  const total=vals.reduce((s,v)=>s+v.ms.pay,0);
  document.getElementById('bar-count').textContent=`${vals.length} shift${vals.length!==1?'s':''} selected`;
  document.getElementById('bar-earn').textContent=`$${total.toLocaleString()}`;
  document.getElementById('bottom-bar').className=vals.length>0?'bottom-bar visible':'bottom-bar';
}

function submitToCalendar(){
  const entries=Object.values(selected).sort((a,b)=>new Date(a.yr,a.mo,a.dy)-new Date(b.yr,b.mo,b.dy));
  if(!entries.length)return;
  const total=entries.reduce((s,e)=>s+e.ms.pay,0);
  const pad=n=>String(n).padStart(2,'0');
  let html=`<div class="card">
    <div class="card-header"><span class="card-title">Add to Google Calendar</span><span class="card-sub sel">$${total.toLocaleString()} projected</span></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Click <strong>+ Add</strong> for each shift.</p>`;
  entries.forEach(({yr,mo,dy,ms})=>{
    const dow=new Date(yr,mo,dy).getDay();
    const endDate=ms.endH>24?new Date(yr,mo,dy+1):new Date(yr,mo,dy);
    const endH=ms.endH>24?ms.endH-24:ms.endH;
    const start=`${yr}${pad(mo+1)}${pad(dy)}T${pad(ms.startH)}0000`;
    const end=`${endDate.getFullYear()}${pad(endDate.getMonth()+1)}${pad(endDate.getDate())}T${pad(endH)}0000`;
    const title=encodeURIComponent(`Moonlighting — ${ms.label.trim()} ($${ms.pay.toLocaleString()})`);
    const details=encodeURIComponent(`Shift: ${ms.label.trim()}\nPay: $${ms.pay.toLocaleString()}\n\nLog in MedHub.`);
    const gcUrl=`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
    html+=`<div class="cal-item">
      <div><div class="cal-date">${MS[mo]} ${dy} <span style="font-weight:400;color:var(--text3)">${DN[dow]}</span></div>
      <div class="cal-shift">${ms.label.trim()}</div></div>
      <div class="cal-right"><span class="cal-pay">$${ms.pay.toLocaleString()}</span><a class="add-btn" href="${gcUrl}" target="_blank">+ Add</a></div>
    </div>`;
  });
  html+=`<div class="cal-total">
    <span style="font-size:14px;color:var(--text2)">${entries.length} shift${entries.length!==1?'s':''}</span>
    <span style="font-size:16px;font-weight:700;color:var(--green)">$${total.toLocaleString()} total</span>
  </div></div>
  <button class="btn btn-secondary" style="width:100%;margin-bottom:.5rem" onclick="backToMain()">← Back</button>`;
  document.getElementById('root').innerHTML=html;
  document.getElementById('month-nav').style.display='none';
  document.getElementById('bottom-bar').className='bottom-bar';
}

function backToMain(){document.getElementById('month-nav').style.display='flex';updateBar();renderMonthNav();renderContent();}

function getMonthsForYear(){
  if(activeYear==='2025-2026') return Array.from({length:13},(_,i)=>{const d=new Date(2025,5+i,1);return{yr:d.getFullYear(),mo:d.getMonth()};});
  return Array.from({length:13},(_,i)=>{const d=new Date(2026,5+i,1);return{yr:d.getFullYear(),mo:d.getMonth()};});
}

function renderMonthNav(){
  const months=getMonthsForYear();
  const nav=document.getElementById('month-nav');
  nav.style.display='flex';
  // Check if month has any moonlighting open (quick check)
  nav.innerHTML=months.map(({yr,mo})=>{
    const isActive=yr===viewYear&&mo===viewMonth;
    const hasData=allShifts.some(s=>s.yr===yr&&s.mo===mo);
    // Check if month is fully blocked (all vacation/ICU)
    const dim=new Date(yr,mo+1,0).getDate();
    const allBlocked=Array.from({length:dim},(_,i)=>i+1).every(d=>isVacation(yr,mo,d)||isICU(yr,mo,d)||isJeopardy(yr,mo,d));
    return `<button class="month-btn ${isActive?'active':allBlocked?'blocked':hasData?'':'empty'}" onclick="setMonth(${yr},${mo})">${MS[mo]}<br><span style="font-size:9px;opacity:.6">${yr}</span></button>`;
  }).join('');
}

function setMonth(yr,mo){viewYear=yr;viewMonth=mo;renderMonthNav();renderContent();}

function setYear(y){
  activeYear=y;
  document.querySelectorAll('.year-tab').forEach((el,i)=>{el.classList.toggle('active',(i===0&&y==='2025-2026')||(i===1&&y==='2026-2027'));});
  // Set to first month of that year
  const firstMonth=activeYear==='2025-2026'?{yr:2025,mo:5}:{yr:2026,mo:5};
  // Use current month if it falls in range
  const now=new Date();
  const nowYr=now.getFullYear(),nowMo=now.getMonth();
  const months=getMonthsForYear();
  const inRange=months.some(m=>m.yr===nowYr&&m.mo===nowMo);
  if(inRange){viewYear=nowYr;viewMonth=nowMo;}
  else{viewYear=firstMonth.yr;viewMonth=firstMonth.mo;}
  renderMonthNav();renderContent();
}

function renderContent(){
  const yr=viewYear,mo=viewMonth;
  const monthShifts=allShifts.filter(s=>s.yr===yr&&s.mo===mo).sort((a,b)=>a.dy-b.dy);
  const days=computeMonth(allShifts,yr,mo);
  const openDays=days.filter(d=>d.avail.length>0);
  const hasSchedule=monthShifts.length>0;
  const overnightDays=openDays.filter(d=>d.avail.some(m=>m.id==='on'));
  const swingDays=openDays.filter(d=>d.avail.some(m=>m.id==='s1'||m.id==='s2'));
  // Max = best single shift per open day (one shift per day max)
  const maxEarn=openDays.reduce((s,d)=>s+d.avail.reduce((mx,ms)=>ms.pay>mx?ms.pay:mx,0),0);
  const monthSel=Object.values(selected).filter(v=>v.yr===yr&&v.mo===mo);
  const selEarn=monthSel.reduce((s,v)=>s+v.ms.pay,0);

  // Unique rotations this month
  const dim=new Date(yr,mo+1,0).getDate();
  const rotSet=new Set();
  for(let d=1;d<=dim;d++){const r=getRotation(yr,mo,d);if(r)rotSet.add(r);}
  const jeopardyDays=Array.from({length:dim},(_,i)=>i+1).filter(d=>isJeopardy(yr,mo,d));

  let html='';

  // Banners
  [...rotSet].forEach(rot=>{
    const m=ROT_META[rot];if(!m)return;
    html+=`<div class="banner ${m.cls}"><span style="font-size:16px">${m.icon}</span><div><strong>${m.label}</strong><span style="font-size:11px;display:block;opacity:.8">${m.note}</span></div></div>`;
  });
  if(jeopardyDays.length>0){
    html+=`<div class="banner b-jeopardy"><span style="font-size:16px">🚨</span><div><strong>Jeopardy coverage</strong><span style="font-size:11px;display:block;opacity:.8">Days ${jeopardyDays[0]}–${jeopardyDays[jeopardyDays.length-1]} blocked for moonlighting</span></div></div>`;
  }

  // Stats
  html+=`<div class="card">
    <div class="card-header"><span class="card-title">${MN[mo]} ${yr}</span><span class="card-sub">${monthShifts.length} EM shifts · ${openDays.length} open days</span></div>
    <div class="stats">
      <div class="stat"><div class="stat-n g">${openDays.length}</div><div class="stat-l">Open days</div></div>
      <div class="stat"><div class="stat-n b">${overnightDays.length}</div><div class="stat-l">Overnight ok</div></div>
      <div class="stat"><div class="stat-n b">${swingDays.length}</div><div class="stat-l">Swing ok</div></div>
      <div class="stat"><div class="stat-n b">79</div><div class="stat-l">Hr cap</div></div>
    </div>
  </div>`;

  // Two col
  html+=`<div class="two-col">`;

  // Clinical schedule
  html+=`<div class="col-card"><div class="col-title">📋 Clinical schedule</div>`;
  if(!hasSchedule){html+=`<div class="empty-state">No shifts loaded yet</div>`;}
  else{monthShifts.forEach(s=>{
    const dow=new Date(s.yr,s.mo,s.dy).getDay();
    html+=`<div class="sched-row">
      <div><div class="sched-date">${MS[s.mo]} ${s.dy}</div><div class="sched-dow">${DN[dow]}</div></div>
      <div class="sched-right"><div class="sched-name">${s.name}</div><div class="sched-time">${shiftTime(s)}</div></div>
    </div>`;
  });}
  html+=`</div>`;

  // Moonlighting
  html+=`<div class="col-card">
    <div class="col-title"><span>🌙 Moonlighting</span>${monthSel.length>0?`<span style="color:var(--green);font-weight:600;font-size:10px">${monthSel.length} · $${selEarn.toLocaleString()}</span>`:''}</div>`;
  if(!openDays.length){
    html+=`<div class="empty-state">${jeopardyDays.length===dim?'🚨 Jeopardy month':isVacation(yr,mo,1)?'🏖 Vacation':'No open days this month'}</div>`;
  } else {
    openDays.forEach(({d,dow,avail})=>{
      const dayN=dn(yr,mo,d);
      const pfx=dayPrefix(yr,mo,d);
      const selKey=Object.keys(selected).find(k=>k.startsWith(pfx));
      const selMsId=selKey?selKey.split(':')[1]:null;
      const selMs=selMsId?MOON.find(m=>m.id===selMsId):null;
      const would7=!selMsId&&wouldCreate7(dayN);
      html+=`<div class="moon-row ${would7?'dim':''}">
        <div class="moon-top">
          <div><div class="moon-date">${MS[mo]} ${d}</div><div class="moon-dow">${DN[dow]}</div></div>
          <div class="moon-pay ${selMs?'sel':''}">${selMs?`$${selMs.pay.toLocaleString()}`:''}</div>
        </div>
        <div class="pills-row">`;
      avail.forEach(ms=>{
        const isSel=selMsId===ms.id;
        const dis=would7&&!isSel;
        html+=`<span class="shift-pill ${ms.cls}${isSel?' sel':''}${dis?' disabled':''}" onclick="${dis?'':'toggleShift('+yr+','+mo+','+d+',\''+ms.id+'\')'}" title="${dis?'7-day limit':ms.label}">${ms.label}</span>`;
      });
      html+=`</div>${would7?'<div class="block-reason">⚠ 7-consecutive-day limit</div>':''}</div>`;
    });
  }
  html+=`</div></div>`;

  // Earnings
  if(openDays.length>0){
    html+=`<div class="card">
      <div class="card-header"><span class="card-title">Earnings potential</span></div>
      <div class="earn-card" style="margin-bottom:12px">
        <div class="earn-label">Maximum possible earnings</div>
        <div class="earn-amount">$${maxEarn.toLocaleString()}</div>
        <div class="earn-desc">One best-paying shift per open day · ${openDays.length} open day${openDays.length!==1?'s':''}</div>
      </div>
      <hr class="earn-divider">
      <div class="earn-note">💰 Swing 1 &amp; 2: <strong>$1,200/shift</strong> &nbsp;·&nbsp; Overnight: <strong>$3,500/shift</strong><br>⚠️ Max 24 hrs/week · 79 hrs/month cap</div>
    </div>`;
  }

  // Rules
  html+=`<div class="card">
    <div class="card-header"><span class="card-title">Rules applied</span></div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>No same-day moonlighting</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>9-hour gap before and after every EM shift (overnight ends 7am — blocked if next EM starts before 4pm)</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>No Tuesday evening moonlighting</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>ICU rotations (MICU, PICU, SICU, CVICU) = no moonlighting</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>Vacation weeks = no internal moonlighting</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>Jeopardy periods blocked (2025-26: 9/29–10/12 · 2026-27: 8/17–8/30, 9/7–9/20, 3/29–4/11)</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>No 7 consecutive working days — dynamically blocked as you select shifts</div>
    <div class="rule"><span style="color:var(--amber);min-width:14px">⚠</span>Max 24 hrs/week · 79 hrs/month including external consulting</div>
    <div class="rule"><span style="color:var(--green);min-width:14px">✓</span>Swing 1: 3–9 pm ($1,200) · Swing 2: 5–11 pm ($1,200) · Overnight: 7p–7a ($3,500)</div>
  </div>`;

  document.getElementById('root').innerHTML=html;
}

async function init(){
  document.getElementById('root').innerHTML='<div class="loader"><div class="spin"></div>Fetching your schedule…</div>';
  document.getElementById('month-nav').style.display='none';
  try{
    const r=await fetch('/api/schedule',{signal:AbortSignal.timeout(10000)});
    if(!r.ok)throw new Error(`Server error ${r.status}`);
    const text=await r.text();
    if(!text.includes('BEGIN:VCALENDAR'))throw new Error('Unexpected: '+text.slice(0,200));
    allShifts=parseIcal(text);
    // Auto-select year based on current date
    const now=new Date();
    if(now.getFullYear()===2025||(now.getFullYear()===2026&&now.getMonth()<5)){
      activeYear='2025-2026';
      document.querySelectorAll('.year-tab').forEach((el,i)=>el.classList.toggle('active',i===0));
    } else {
      activeYear='2026-2027';
      document.querySelectorAll('.year-tab').forEach((el,i)=>el.classList.toggle('active',i===1));
    }
    viewYear=now.getFullYear();viewMonth=now.getMonth();
    renderMonthNav();renderContent();
    document.getElementById('updated').textContent=`Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="card"><div class="err">${e.message}</div></div>`;
  }
}
init();
</script>
</body>
</html>
