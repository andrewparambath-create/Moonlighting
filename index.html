<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlighting — Drew</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f1;color:#1a1a18;min-height:100vh;padding:2rem 1rem;display:flex;justify-content:center}
.wrap{max-width:580px;width:100%}
h1{font-size:24px;font-weight:600;letter-spacing:-.3px}
.sub{font-size:13px;color:#999;margin-top:3px;margin-bottom:1.75rem}
.card{background:#fff;border-radius:14px;border:1px solid #e8e8e4;padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#bbb;margin-bottom:1rem}
.loader{display:flex;align-items:center;gap:10px;color:#999;font-size:14px}
.spin{width:16px;height:16px;border:2px solid #eee;border-top-color:#999;border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.err{font-size:13px;color:#c00;line-height:1.7}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.25rem}
.stat{background:#f8f8f5;border-radius:10px;padding:14px 10px;text-align:center}
.stat-n{font-size:30px;font-weight:600}
.stat-n.g{color:#2e7d32}.stat-n.gr{color:#aaa}
.stat-l{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-top:3px}
.day-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f2f2ef}
.day-row:last-child{border-bottom:none}
.day-name{font-size:15px;font-weight:500}
.day-dow{font-size:12px;color:#ccc;margin-top:2px}
.pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;white-space:nowrap}
.p1{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.p2{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}
.p3{background:#f3e5f5;color:#6a1b9a;border:1px solid #e1bee7}
.empty{font-size:14px;color:#bbb;text-align:center;padding:.75rem 0}
.rule{display:flex;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px solid #f5f5f2;color:#777;line-height:1.5}
.rule:last-child{border-bottom:none}
.footer{font-size:11px;color:#ccc;text-align:center;margin-top:.5rem;display:flex;justify-content:space-between}
.refresh{font-size:11px;color:#ccc;cursor:pointer;background:none;border:none;text-decoration:underline;cursor:pointer}
.refresh:hover{color:#888}
</style>
</head>
<body>
<div class="wrap">
  <h1>Moonlighting</h1>
  <div class="sub" id="sub">Loading your schedule…</div>
  <div id="root"><div class="card"><div class="loader"><div class="spin"></div>Fetching from Google Calendar…</div></div></div>
  <div class="footer">
    <span id="updated"></span>
    <button class="refresh" onclick="init()">↺ refresh</button>
  </div>
</div>
<script>
const GAP=9;
const MOON=[
  {id:'s1',label:'Swing 1  3–9 pm',  startH:15,endH:21,hrs:6, cls:'p1'},
  {id:'s2',label:'Swing 2  5–11 pm', startH:17,endH:23,hrs:6, cls:'p2'},
  {id:'on',label:'Overnight 7p–7a',  startH:19,endH:31,hrs:12,cls:'p3'},
];
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function parseDT(s){
  if(!s)return null;
  const yr=+s.slice(0,4),mo=+s.slice(4,6)-1,dy=+s.slice(6,8);
  let hr=0;if(s.includes('T'))hr=+s.slice(9,11);
  return{yr,mo,dy,hr};
}
function dn(yr,mo,dy){return Math.floor(new Date(yr,mo,dy)/86400000);}

function parseIcal(text){
  const shifts=[];
  text.split('BEGIN:VEVENT').slice(1).forEach(b=>{
    const get=k=>{const m=b.match(new RegExp(k+'[^:]*:([^\\r\\n]+)'));return m?m[1].trim():''};
    const ds=parseDT(get('DTSTART')),de=parseDT(get('DTEND'));
    const name=(get('SUMMARY')||'').replace(/\\,/g,',').trim();
    if(!ds||!name)return;
    let endH=de?(de.dy>ds.dy?de.hr+24:de.hr):ds.hr+9;
    if(endH===0)endH=24;
    shifts.push({name,yr:ds.yr,mo:ds.mo,dy:ds.dy,startH:ds.hr,endH,
      night:ds.hr>=22||(de&&de.dy>ds.dy),dn:dn(ds.yr,ds.mo,ds.dy)});
  });
  return shifts;
}

function computeMonth(shifts,yr,mo){
  const dim=new Date(yr,mo+1,0).getDate();
  const out=[];
  for(let d=1;d<=dim;d++){
    const dow=new Date(yr,mo,d).getDay();
    const dayN=dn(yr,mo,d);
    const todayEM=shifts.filter(s=>s.dn===dayN);
    const hasEM=todayEM.length>0;
    const isTue=dow===2;
    const inSICU=[0,1,2,3].some(b=>shifts.some(s=>s.dn===dayN-b&&/sicu|icu/i.test(s.name)));
    if(hasEM||isTue||inSICU){out.push({d,dow,hasEM,isTue,inSICU,avail:[]});continue;}
    const avail=[];
    for(const ms of MOON){
      const mS=dayN*24+ms.startH,mE=dayN*24+ms.endH;
      let ok=true;
      for(const em of shifts){
        const eS=em.dn*24+em.startH,eE=em.dn*24+em.endH;
        if(eE>mS-GAP&&eE<=mS+1){ok=false;break;}
        if(mE>eS-GAP&&mE<=eS+ms.hrs+1){ok=false;break;}
      }
      if(ok)avail.push(ms);
    }
    out.push({d,dow,hasEM:false,isTue:false,inSICU:false,avail});
  }
  return out;
}

function render(shifts){
  const now=new Date();
  const yr=now.getFullYear(),mo=now.getMonth();
  document.getElementById('sub').textContent=`${MN[mo]} ${yr}  ·  Stanford EM`;
  const days=computeMonth(shifts,yr,mo);
  const open=days.filter(d=>d.avail.length>0);
  const emCount=shifts.filter(s=>s.yr===yr&&s.mo===mo).length;
  let html='';
  html+=`<div class="card"><div class="card-title">Overview</div><div class="stats">
    <div class="stat"><div class="stat-n g">${open.length}</div><div class="stat-l">Open days</div></div>
    <div class="stat"><div class="stat-n gr">${emCount}</div><div class="stat-l">EM shifts</div></div>
    <div class="stat"><div class="stat-n gr">79</div><div class="stat-l">Hr cap</div></div>
  </div></div>`;
  html+=`<div class="card"><div class="card-title">Shifts you can request</div>`;
  if(!open.length){html+=`<div class="empty">No open days this month</div>`;}
  else{open.forEach(({d,dow,avail})=>{
    html+=`<div class="day-row">
      <div><div class="day-name">${MS[mo]} ${d}</div><div class="day-dow">${DN[dow]}</div></div>
      <div class="pills">${avail.map(ms=>`<span class="pill ${ms.cls}">${ms.label}</span>`).join('')}</div>
    </div>`;
  });}
  html+=`</div>`;
  html+=`<div class="card"><div class="card-title">Rules applied</div>
    <div class="rule"><span style="color:#c00">✕</span>No same-day moonlighting</div>
    <div class="rule"><span style="color:#c00">✕</span>9-hour gap before and after every EM shift (both directions)</div>
    <div class="rule"><span style="color:#c00">✕</span>No Tuesday evening moonlighting</div>
    <div class="rule"><span style="color:#c00">✕</span>SICU/ICU block = no moonlighting for 4 days</div>
    <div class="rule"><span style="color:#e6a800">⚠</span>Max 24 hrs/week · 79 hrs/month including external consulting</div>
    <div class="rule"><span style="color:#2e7d32">✓</span>Swing 1: 3–9 pm · Swing 2: 5–11 pm · Overnight: 7 pm–7 am</div>
  </div>`;
  document.getElementById('root').innerHTML=html;
  document.getElementById('updated').textContent=`Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
}

function showErr(msg){
  document.getElementById('sub').textContent='Error';
  document.getElementById('root').innerHTML=`<div class="card"><div class="err">${msg}</div></div>`;
}

async function init(){
  document.getElementById('root').innerHTML='<div class="card"><div class="loader"><div class="spin"></div>Fetching…</div></div>';
  try{
    const r=await fetch('/api/schedule',{signal:AbortSignal.timeout(10000)});
    if(!r.ok)throw new Error(`Server error ${r.status}`);
    const text=await r.text();
    if(!text.includes('BEGIN:VCALENDAR'))throw new Error('Invalid response from calendar');
    const shifts=parseIcal(text);
    if(!shifts.length)throw new Error('No shifts found');
    render(shifts);
  }catch(e){showErr(`Could not load: ${e.message}`);}
}
init();
</script>
</body>
</html>
