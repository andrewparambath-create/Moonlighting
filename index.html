<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlighting — Drew</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f8f8f5;--border:#eceae4;
  --text:#1a1a18;--text2:#777;--text3:#bbb;
  --green:#2e7d32;--green-bg:#e8f5e9;--green-border:#c8e6c9;
  --blue:#1565c0;--blue-bg:#e3f2fd;--blue-border:#bbdefb;
  --purple:#6a1b9a;--purple-bg:#f3e5f5;--purple-border:#e1bee7;
  --red:#c62828;--amber:#f57f17;
  --radius:14px;--radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 5rem}
.wrap{max-width:600px;margin:0 auto}

.header{margin-bottom:1.25rem}
.header h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.header p{font-size:13px;color:var(--text2)}

/* Month nav */
.month-nav{display:flex;gap:6px;margin-bottom:1.25rem;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:5px}
.month-btn{flex:1;font-size:13px;font-weight:500;padding:8px 4px;border-radius:var(--radius-sm);border:none;background:none;cursor:pointer;color:var(--text2);transition:all .15s;text-align:center}
.month-btn:hover{background:var(--surface2);color:var(--text)}
.month-btn.active{background:var(--text);color:#fff}
.month-btn.empty{color:var(--text3);cursor:default}
.month-btn.empty:hover{background:none}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:.875rem}
.card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.card-sub{font-size:12px;color:var(--text2)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-n.g{color:var(--green)}.stat-n.b{color:var(--text3)}
.stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}

/* Day rows — selectable */
.day-row{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:var(--radius-sm);border:1.5px solid transparent;margin:3px 0;cursor:pointer;transition:all .12s;user-select:none}
.day-row:hover{background:var(--surface2)}
.day-row.selected{background:var(--green-bg);border-color:var(--green-border)}
.day-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s;font-size:11px}
.day-row.selected .day-check{background:var(--green);border-color:var(--green);color:#fff}
.day-info{flex:1}
.day-date{font-size:15px;font-weight:600}
.day-dow{font-size:11px;color:var(--text3);margin-top:1px}
.day-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.pills{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.pill{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap}
.p1{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.p2{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
.p3{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
.day-pay{font-size:11px;color:var(--text2)}

/* Shift picker popup */
.shift-picker{display:none;background:var(--surface);border:1.5px solid var(--green-border);border-radius:var(--radius-sm);padding:10px;margin:-6px 0 6px 30px}
.shift-picker.open{display:block}
.shift-option{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .1s}
.shift-option:hover{background:var(--surface2)}
.shift-option.chosen{background:var(--green-bg)}
.shift-option-left{display:flex;align-items:center;gap:8px}
.shift-option-pay{font-size:12px;color:var(--green);font-weight:500}

/* Empty/no schedule */
.empty-state{text-align:center;padding:1.5rem 0;color:var(--text3);font-size:14px}
.no-schedule{text-align:center;padding:2rem 1rem;color:var(--text3)}
.no-schedule .icon{font-size:32px;margin-bottom:8px}

/* Earnings */
.earn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.earn-card{background:var(--surface2);border-radius:var(--radius-sm);padding:14px}
.earn-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.earn-amount{font-size:22px;font-weight:700;color:var(--green);margin-bottom:2px}
.earn-desc{font-size:11px;color:var(--text2);line-height:1.5}
.earn-divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.earn-note{font-size:12px;color:var(--text2);line-height:1.8}

/* Rules */
.rule{display:flex;gap:10px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);color:var(--text2);line-height:1.5;align-items:flex-start}
.rule:last-child{border-bottom:none}

/* Sticky bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 1rem;display:none;z-index:100}
.bottom-bar.visible{display:block}
.bottom-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bottom-summary{font-size:13px;color:var(--text2)}
.bottom-summary strong{color:var(--text);font-size:15px}
.bottom-actions{display:flex;gap:8px}
.btn{font-size:13px;font-weight:500;padding:10px 18px;border-radius:var(--radius-sm);border:none;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:#1b5e20}

/* Loader */
.loader{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text2);font-size:14px;padding:3rem}
.spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:sp .65s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.err{font-size:13px;color:var(--red);line-height:1.7;padding:.5rem 0}

.footer{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;padding:0 2px}
.footer-time{font-size:11px;color:var(--text3)}
.refresh{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Moonlighting</h1>
    <p>Stanford EM · Tap a date to select shifts, then submit to add to calendar</p>
  </div>

  <div id="month-nav" class="month-nav" style="display:none"></div>
  <div id="root"><div class="loader"><div class="spin"></div>Fetching your schedule…</div></div>

  <div class="footer">
    <span class="footer-time" id="updated"></span>
    <button class="refresh" onclick="init()">↺ refresh</button>
  </div>
</div>

<!-- Sticky bottom bar -->
<div class="bottom-bar" id="bottom-bar">
  <div class="bottom-inner">
    <div class="bottom-summary">
      <div id="bar-count">0 shifts selected</div>
      <strong id="bar-earn">$0</strong> projected
    </div>
    <div class="bottom-actions">
      <button class="btn btn-secondary" onclick="clearSelections()">Clear</button>
      <button class="btn btn-primary" onclick="submitToCalendar()">📅 Add to Calendar</button>
    </div>
  </div>
</div>

<script>
const GAP=9;
const SWING_PAY=1200, ON_PAY=3500;
const MOON=[
  {id:'s1',label:'Swing 1  3–9 pm',  startH:15,endH:21, hrs:6,  cls:'p1',pay:SWING_PAY},
  {id:'s2',label:'Swing 2  5–11 pm', startH:17,endH:23, hrs:6,  cls:'p2',pay:SWING_PAY},
  {id:'on',label:'Overnight  7p–7a', startH:19,endH:31, hrs:12, cls:'p3',pay:ON_PAY},
];
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let allShifts=[], viewMonth=new Date().getMonth(), viewYear=new Date().getFullYear();
// selected = { 'YYYY-MM-DD': {ms: moonShift} }
let selected={};
// which day picker is open
let openPicker=null;

function dn(yr,mo,dy){return Math.floor(new Date(yr,mo,dy)/86400000);}

function parseIcal(text){
  const shifts=[];
  const unfolded=text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  unfolded.split('BEGIN:VEVENT').slice(1).forEach(b=>{
    const get=k=>{const m=b.match(new RegExp(k+'[^:;]*(?:;[^:]*)?:([^\\r\\n]+)'));return m?m[1].trim():'';};
    const dtstart=get('DTSTART'),dtend=get('DTEND');
    const name=(get('SUMMARY')||'').replace(/\\,/g,',').replace(/\\n/g,' ').trim();
    if(!dtstart||!name)return;
    const parseDT=s=>{
      const c=s.replace(/[-:]/g,'');
      const yr=+c.slice(0,4),mo=+c.slice(4,6)-1,dy=+c.slice(6,8);
      let hr=0;
      const tIdx=c.indexOf('T');if(tIdx>=0)hr=+c.slice(tIdx+1,tIdx+3)||0;
      return{yr,mo,dy,hr};
    };
    const s=parseDT(dtstart),e=dtend?parseDT(dtend):null;
    let endH=e?(e.dy>s.dy?e.hr+24:(e.hr===0&&e.dy===s.dy?24:e.hr)):s.hr+9;
    if(endH===0)endH=24;
    shifts.push({name,yr:s.yr,mo:s.mo,dy:s.dy,startH:s.hr,endH,night:s.hr>=22||(e&&e.dy>s.dy),dn:dn(s.yr,s.mo,s.dy)});
  });
  return shifts;
}

function computeMonth(shifts,yr,mo){
  const dim=new Date(yr,mo+1,0).getDate();
  const out=[];
  for(let d=1;d<=dim;d++){
    const dow=new Date(yr,mo,d).getDay();
    const dayN=dn(yr,mo,d);
    const hasEM=shifts.some(s=>s.dn===dayN);
    const isTue=dow===2;
    const inSICU=[0,1,2,3].some(b=>shifts.some(s=>s.dn===dayN-b&&/sicu|icu/i.test(s.name)));
    if(hasEM||isTue||inSICU){out.push({d,dow,hasEM,isTue,inSICU,avail:[]});continue;}
    const avail=[];
    for(const ms of MOON){
      const mS=dayN*24+ms.startH,mE=dayN*24+ms.endH;
      let ok=true;
      for(const em of shifts){
        const eS=em.dn*24+em.startH,eE=em.dn*24+em.endH;
        if(mS<eE+GAP&&mS>=eS){ok=false;break;}
        if(mE>eS-GAP&&mE<=eS+ms.hrs+1){ok=false;break;}
      }
      if(ok)avail.push(ms);
    }
    out.push({d,dow,hasEM:false,isTue:false,inSICU:false,avail});
  }
  return out;
}

function dateKey(yr,mo,d){return `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function toggleDay(yr,mo,d,avail){
  const key=dateKey(yr,mo,d);
  if(openPicker===key){
    openPicker=null;
  } else {
    openPicker=key;
    // auto-select best shift if nothing chosen yet
    if(!selected[key]){
      const best=avail.reduce((b,ms)=>ms.pay>b.pay?ms:b,avail[0]);
      selected[key]={ms:best};
    }
  }
  updateBar();
  renderContent();
}

function choosShift(yr,mo,d,msId){
  const key=dateKey(yr,mo,d);
  const days=computeMonth(allShifts,yr,mo);
  const day=days.find(x=>x.d===d);
  if(!day)return;
  const ms=day.avail.find(m=>m.id===msId);
  if(!ms)return;
  selected[key]={ms};
  updateBar();
  renderContent();
}

function deselect(key){
  delete selected[key];
  if(openPicker===key)openPicker=null;
  updateBar();
  renderContent();
}

function clearSelections(){
  selected={};openPicker=null;
  updateBar();
  renderContent();
}

function updateBar(){
  const keys=Object.keys(selected);
  const total=keys.reduce((s,k)=>s+selected[k].ms.pay,0);
  document.getElementById('bar-count').textContent=`${keys.length} shift${keys.length!==1?'s':''} selected`;
  document.getElementById('bar-earn').textContent=`$${total.toLocaleString()}`;
  document.getElementById('bottom-bar').className=keys.length>0?'bottom-bar visible':'bottom-bar';
}

function submitToCalendar(){
  const keys=Object.keys(selected).sort();
  if(!keys.length)return;

  // Build Google Calendar "add multiple events" links and open each
  // Google Calendar URL format for adding events
  const links=keys.map(key=>{
    const ms=selected[key].ms;
    const [yr,mo,dy]=key.split('-').map(Number);
    const moZ=mo; // mo is 1-indexed in key
    
    // Start/end in YYYYMMDDTHHMMSS format
    const pad=n=>String(n).padStart(2,'0');
    const startH=ms.startH;
    const endH=ms.endH>24?ms.endH-24:ms.endH;
    const endDy=ms.endH>24?dy+1:dy;
    const endMo=endDy>new Date(yr,moZ-1+1,0).getDate()?moZ+1:moZ;
    const endYr=endMo>12?yr+1:yr;
    const endMoFinal=endMo>12?1:endMo;
    const endDyFinal=endDy>new Date(yr,moZ-1+1,0).getDate()?1:endDy;

    const start=`${yr}${pad(moZ)}${pad(dy)}T${pad(startH)}0000`;
    const end=`${endYr}${pad(endMoFinal)}${pad(endDyFinal)}T${pad(endH)}0000`;
    const title=encodeURIComponent(`Moonlighting — ${ms.label.trim()} ($${ms.pay.toLocaleString()})`);
    const details=encodeURIComponent(`Moonlighting shift at Stanford EM\nShift: ${ms.label.trim()}\nPay: $${ms.pay.toLocaleString()}\n\nRemember to log in MedHub.`);

    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
  });

  // Open first immediately, rest with slight delay (browsers block multiple popups)
  if(links.length===1){
    window.open(links[0],'_blank');
  } else {
    // Show a summary page with all links
    showCalendarSummary(keys, links);
  }
}

function showCalendarSummary(keys, links){
  const total=keys.reduce((s,k)=>s+selected[k].ms.pay,0);
  const MS2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DN2=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html=`<div class="card">
    <div class="card-header"><span class="card-title">Add to Google Calendar</span><span class="card-sub">$${total.toLocaleString()} projected</span></div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:1rem">Click each shift below to add it to your calendar. Google Calendar will open for each one.</p>`;

  keys.forEach((key,i)=>{
    const ms=selected[key].ms;
    const [yr,mo,dy]=key.split('-').map(Number);
    const dow=new Date(yr,mo-1,dy).getDay();
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:14px;font-weight:600">${MS2[mo-1]} ${dy} <span style="font-weight:400;color:var(--text3)">${DN2[dow]}</span></div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${ms.label.trim()}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:13px;font-weight:600;color:var(--green)">$${ms.pay.toLocaleString()}</span>
        <a href="${links[i]}" target="_blank" style="font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;background:var(--green);color:#fff;text-decoration:none">+ Add</a>
      </div>
    </div>`;
  });

  html+=`<div style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;font-weight:600">Total projected: <span style="color:var(--green)">$${total.toLocaleString()}</span></span>
    <button class="btn btn-secondary" onclick="backToCalendar()" style="font-size:12px;padding:6px 14px">← Back</button>
  </div></div>`;

  document.getElementById('root').innerHTML=html;
  document.getElementById('month-nav').style.display='none';
  document.getElementById('bottom-bar').className='bottom-bar';
}

function backToCalendar(){
  document.getElementById('month-nav').style.display='flex';
  updateBar();
  renderContent();
}

function getAvailableMonths(){
  const months=new Set();
  allShifts.forEach(s=>months.add(`${s.yr}-${s.mo}`));
  const now=new Date();
  for(let i=0;i<3;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);months.add(`${d.getFullYear()}-${d.getMonth()}`);}
  return [...months].sort().map(k=>{const[y,m]=k.split('-');return{yr:+y,mo:+m};});
}

function renderMonthNav(){
  const months=getAvailableMonths();
  const nav=document.getElementById('month-nav');
  nav.style.display='flex';
  nav.innerHTML=months.map(({yr,mo})=>{
    const hasData=allShifts.some(s=>s.yr===yr&&s.mo===mo);
    const isActive=yr===viewYear&&mo===viewMonth;
    const cls=isActive?'active':hasData?'':'empty';
    return `<button class="month-btn ${cls}" onclick="setMonth(${yr},${mo})">${MS[mo]}</button>`;
  }).join('');
}

function setMonth(yr,mo){
  viewYear=yr;viewMonth=mo;
  openPicker=null;
  renderMonthNav();
  renderContent();
}

function renderContent(){
  const yr=viewYear,mo=viewMonth;
  const monthShifts=allShifts.filter(s=>s.yr===yr&&s.mo===mo);
  const days=computeMonth(allShifts,yr,mo);
  const openDays=days.filter(d=>d.avail.length>0);
  const hasSchedule=allShifts.some(s=>s.yr===yr&&s.mo===mo);

  const maxEarn=openDays.reduce((s,d)=>s+d.avail.reduce((mx,ms)=>ms.pay>mx?ms.pay:mx,0),0);
  const overnightDays=openDays.filter(d=>d.avail.some(ms=>ms.id==='on'));
  const swingDays=openDays.filter(d=>d.avail.some(ms=>ms.id==='s1'||ms.id==='s2'));
  const realON=Math.min(2,overnightDays.length),realSwing=Math.min(2,swingDays.length);
  const realisticEarn=realON*ON_PAY+realSwing*SWING_PAY;

  // Selected earnings for this month
  const monthSelected=Object.entries(selected).filter(([k])=>{
    const[y,m]=k.split('-');return +y===yr&&+m-1===mo;
  });
  const selectedEarn=monthSelected.reduce((s,[,v])=>s+v.ms.pay,0);

  let html='';

  // Stats
  html+=`<div class="card">
    <div class="card-header"><span class="card-title">${MN[mo]} ${yr}</span><span class="card-sub">${monthShifts.length} EM shifts</span></div>
    <div class="stats">
      <div class="stat"><div class="stat-n g">${openDays.length}</div><div class="stat-l">Open days</div></div>
      <div class="stat"><div class="stat-n b">${overnightDays.length}</div><div class="stat-l">Overnight ok</div></div>
      <div class="stat"><div class="stat-n b">${swingDays.length}</div><div class="stat-l">Swing ok</div></div>
      <div class="stat"><div class="stat-n b">79</div><div class="stat-l">Hr cap</div></div>
    </div>
  </div>`;

  // Shift selector
  html+=`<div class="card">
    <div class="card-header">
      <span class="card-title">Select shifts to request</span>
      ${monthSelected.length>0?`<span class="card-sub" style="color:var(--green);font-weight:600">${monthSelected.length} selected · $${selectedEarn.toLocaleString()}</span>`:'<span class="card-sub">Tap a date to select</span>'}
    </div>`;

  if(!hasSchedule){
    html+=`<div class="no-schedule"><div class="icon">📅</div><p>Schedule not yet available for ${MN[mo]}</p></div>`;
  } else if(!openDays.length){
    html+=`<div class="empty-state">No open moonlighting days this month</div>`;
  } else {
    openDays.forEach(({d,dow,avail})=>{
      const key=dateKey(yr,mo+1,d); // key uses 1-indexed month
      // fix: build key correctly
      const k=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isSel=!!selected[k];
      const isOpen=openPicker===k;
      const chosenMs=selected[k]?.ms;
      const bestPay=avail.reduce((mx,ms)=>ms.pay>mx?ms.pay:mx,0);

      html+=`<div class="day-row ${isSel?'selected':''}" onclick="toggleDay(${yr},${mo},${d},[${avail.map(ms=>`'${ms.id}'`).join(',')}])">
        <div class="day-check">${isSel?'✓':''}</div>
        <div class="day-info">
          <div class="day-date">${MS[mo]} ${d}</div>
          <div class="day-dow">${DN[dow]}</div>
        </div>
        <div class="day-right">
          <div class="pills">${avail.map(ms=>`<span class="pill ${ms.cls}">${ms.label}</span>`).join('')}</div>
          <div class="day-pay">${isSel?`<span style="color:var(--green);font-weight:600">$${chosenMs.pay.toLocaleString()} · ${chosenMs.label.trim()}</span>`:`up to $${bestPay.toLocaleString()}`}</div>
        </div>
      </div>`;

      // Shift picker
      if(isOpen){
        html+=`<div class="shift-picker open">`;
        avail.forEach(ms=>{
          const isChosen=chosenMs&&chosenMs.id===ms.id;
          html+=`<div class="shift-option ${isChosen?'chosen':''}" onclick="event.stopPropagation();choosShift(${yr},${mo},${d},'${ms.id}')">
            <div class="shift-option-left">
              <span class="pill ${ms.cls}">${ms.label}</span>
            </div>
            <span class="shift-option-pay">$${ms.pay.toLocaleString()}</span>
          </div>`;
        });
        if(isSel){
          html+=`<div class="shift-option" style="color:var(--red)" onclick="event.stopPropagation();deselect('${k}')">
            <div class="shift-option-left">✕ Remove this day</div>
          </div>`;
        }
        html+=`</div>`;
      }
    });
  }
  html+=`</div>`;

  // Earnings
  if(hasSchedule&&openDays.length>0){
    html+=`<div class="card">
      <div class="card-header"><span class="card-title">Earnings potential</span></div>
      <div class="earn-grid">
        <div class="earn-card">
          <div class="earn-label">Maximum possible</div>
          <div class="earn-amount">$${maxEarn.toLocaleString()}</div>
          <div class="earn-desc">Best shift every open day</div>
        </div>
        <div class="earn-card">
          <div class="earn-label">Realistic estimate</div>
          <div class="earn-amount">$${realisticEarn.toLocaleString()}</div>
          <div class="earn-desc">${realON} overnight${realON!==1?'s':''} + ${realSwing} swing${realSwing!==1?'s':''}</div>
        </div>
      </div>
      <hr class="earn-divider">
      <div class="earn-note">
        💰 Swing 1 &amp; 2: <strong>$1,200/shift</strong> &nbsp;·&nbsp; Overnight: <strong>$3,500/shift</strong><br>
        ⚠️ Max 24 hrs/week · 79 hrs/month cap
      </div>
    </div>`;
  }

  // Rules
  html+=`<div class="card">
    <div class="card-header"><span class="card-title">Rules applied</span></div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>No same-day moonlighting</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>9-hour gap before and after every EM shift — overnight (ends 7am) blocked if next EM starts before 4pm</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>No Tuesday evening moonlighting</div>
    <div class="rule"><span style="color:var(--red);min-width:14px">✕</span>SICU/ICU block = no moonlighting for 4 days</div>
    <div class="rule"><span style="color:var(--amber);min-width:14px">⚠</span>Max 24 hrs/week · 79 hrs/month including external consulting</div>
    <div class="rule"><span style="color:var(--green);min-width:14px">✓</span>Swing 1: 3–9 pm · Swing 2: 5–11 pm · Overnight: 7 pm–7 am</div>
  </div>`;

  document.getElementById('root').innerHTML=html;
}

async function init(){
  document.getElementById('root').innerHTML='<div class="loader"><div class="spin"></div>Fetching your schedule…</div>';
  document.getElementById('month-nav').style.display='none';
  try{
    const r=await fetch('/api/schedule',{signal:AbortSignal.timeout(10000)});
    if(!r.ok)throw new Error(`Server error ${r.status}`);
    const text=await r.text();
    if(!text.includes('BEGIN:VCALENDAR'))throw new Error('Unexpected response: '+text.slice(0,200));
    allShifts=parseIcal(text);
    const now=new Date();
    viewYear=now.getFullYear();viewMonth=now.getMonth();
    renderMonthNav();
    renderContent();
    document.getElementById('updated').textContent=`Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
  }catch(e){
    document.getElementById('root').innerHTML=`<div class="card"><div class="err">${e.message}</div></div>`;
  }
}
init();
</script>
</body>
</html>
